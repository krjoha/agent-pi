# Agent chains for the Plan / Build / Ship workflow.
# See docs/workflow-architecture.md for the canonical workflow and the
# rationale behind each chain. Human gates between chains are external
# to this file — chains terminate; the user invokes the next phase.

# ─── Phase 1: Plan ────────────────────────────────────────────────

plan:
  description: "Plan — produce a structured implementation plan for human approval"
  steps:
    - agent: planner
      prompt: "Produce a detailed, phased implementation plan for the following request. Ground every phase in real files and patterns; call out assumptions and unknowns explicitly.\n\nRequest: $INPUT"

plan-refine:
  description: "Plan with built-in critique loop — plan, critique, revise, then present to human"
  steps:
    - agent: planner
      prompt: "Produce a detailed, phased implementation plan for the following request.\n\nRequest: $INPUT"
    - agent: reviewer
      prompt: "Critique the implementation plan below for gaps, hidden risks, missed alternatives, and unverified assumptions. Cite file paths or specifics whenever possible.\n\nOriginal request: $ORIGINAL\n\nPlan:\n$INPUT"
    - agent: planner
      prompt: "Revise the plan to address every critique below. Preserve what was correct; replace or expand what was flagged.\n\nOriginal request: $ORIGINAL\n\nCritique:\n$INPUT"

# ─── Phase 2: Build ───────────────────────────────────────────────

build-test:
  description: "Implement and test — builder writes, tester writes/runs tests, herald verifies"
  steps:
    - agent: builder
      prompt: "Implement the approved plan below. Make atomic, focused changes; preserve existing behavior unless the plan explicitly changes it.\n\n$INPUT"
    - agent: tester
      prompt: "Write and run tests covering the implementation below. Cover happy path, edge cases, and error conditions. Report the test command, status, and failures.\n\n$INPUT"
    - agent: herald
      prompt: "Verify all tests pass against the implementation. If a test failure is caused by the implementation, fix it. Report final status with confidence assessment.\n\n$INPUT"

local-review:
  description: "Step 8 — parallel AI source code review via local SGLang fork. Runs after the human confirms steps 6-7."
  steps:
    - agent: scout
      prompt: "Identify the change scope and gather architecture context for review. Default to `git diff` if the user did not specify a scope.\n\nUser request: $ORIGINAL\n\nPrior context: $INPUT"
    - agent: sgl-fork-runner
      prompt: "Run a parallel persona review (correctness, security, performance, dry) against the gathered code context below. Emit the skill's JSON verbatim.\n\n$INPUT"
    - agent: synthesizer
      prompt: "The input is a JSON findings report from the sgl-fork-review skill. If multiple persona reports are present, merge them per your instructions. Otherwise pass through verified, with renumbered IDs and verdict applied.\n\n$INPUT"

# ─── Re-entry / focused chains ────────────────────────────────────

investigate-fix:
  description: "Bug fix flow — investigate, propose fix, implement, review"
  steps:
    - agent: scout
      prompt: "Explore the codebase relevant to this bug report:\n\n$INPUT"
    - agent: reviewer
      prompt: "Investigate this bug and propose a fix. Include reproduction steps and root cause.\n\nContext:\n$INPUT\n\nOriginal request: $ORIGINAL"
    - agent: builder
      prompt: "Implement the proposed fix from the reviewer. Apply the changes exactly as specified.\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this bug fix for correctness and completeness:\n\n$INPUT"

test-fix:
  description: "Test-driven fix cycle — add tests, implement, review"
  steps:
    - agent: tester
      prompt: "Write tests for the following requirement or failing behavior. Run existing tests and report status.\n\n$INPUT"
    - agent: builder
      prompt: "Implement the changes needed to make these tests pass:\n\n$INPUT"
    - agent: reviewer
      prompt: "Review this implementation and test results:\n\n$INPUT"

# ─── Multi-pass code review (revised — fork the quality+security step) ───

code-review:
  description: "Multi-pass code review — parallel context gathering, forked quality+security review, remediation, validation, test verification, and final report"
  steps:
    - agent: scout
      prompt: "# Step 1: Architecture Scout — Deep Structural Research\n\nMap the high-level architecture of the code under review. Do NOT skim — read files thoroughly.\n\n## Scope\n\nThe user's request determines what to review. Parse their intent:\n- If they mention 'last commit' or 'HEAD~1', run `git diff HEAD~1` and focus on those files\n- If they mention 'staged' or 'cached', run `git diff --cached` and focus on those files\n- If they mention 'unstaged' or 'current changes', run `git diff` and focus on those files\n- If they mention a specific directory or file path, focus on that\n- If they say 'full' or 'everything', scan the entire project\n- If unclear, default to `git diff` (unstaged changes)\n\nUser request: $ORIGINAL\n\n## Tasks\n\n1. Identify the change scope — run the appropriate git diff command and list all affected files\n2. Deep-read every changed file end-to-end. For each: module/subsystem, entry points and exports, key interfaces and types, base classes and inheritance chains\n3. Identify the tech stack — languages, frameworks, build tools, runtime\n4. Map module boundaries — how changed files relate to each other and to the rest of the codebase\n5. Map class/type hierarchy for new types — search the entire codebase for existing base classes, interfaces, or enums that could have been extended instead\n6. Catalog reusable infrastructure — shared utilities, base classes, helper libraries\n\nReport findings with file paths and line numbers."
    - agent: ranger
      prompt: "# Step 2: Pattern, Convention & DRY Scout\n\nDeeply analyze coding patterns and enforce DRY. This is the most critical scout — your findings determine whether new code extends the codebase properly or reinvents it.\n\nUser request: $ORIGINAL\n\n## Tasks\n\n1. Identify the change scope — run the appropriate git diff command and list all affected files\n2. Study existing examples FIRST — find 3-5 existing files doing similar things; read them end-to-end; identify the 'golden example' the new code should emulate\n3. DRY enforcement — for every new file/class/enum/utility/type/duplicated block in the diff, search the codebase for existing code that should have been extended or reused. Report each violation with: new code location, existing code it duplicates, specific refactoring suggested\n4. Catalog patterns in changed files: naming, error handling, async patterns, state management, import organization\n5. Identify pattern violations — places where changed code breaks established conventions\n6. Check code style — formatting, indentation, comments\n7. Look for anti-patterns — copy-paste duplication, god objects, deep nesting, magic numbers, dead code\n\n## Output: DRY Violations Section (REQUIRED)\n\n```\n### DRY Violations\n\n| New Code | Existing Code | Action |\n|----------|--------------|--------|\n| path/new.ts:15 NewClass | path/existing.ts:30 BaseClass | Extend BaseClass instead |\n```\n\nIf no violations: state 'No DRY violations detected.'"
    - agent: scout
      prompt: "# Step 3: Dependency, Configuration & Secrets Scout\n\nAnalyze dependencies, configuration, and secrets exposure.\n\nUser request: $ORIGINAL\n\n## Dependency Analysis\n\n1. Identify change scope; map dependency changes (new/removed/version-changed)\n2. For new dependencies: are they necessary? Could existing deps cover the case?\n3. Check configuration changes — env files, config files, build configs, CI/CD\n4. Trace import chains for changed files; check for circular dependencies\n\n## Secrets Scanning (CRITICAL)\n\n5. Scan all changed files line-by-line for: API keys (AKIA, sk-, sk_live_, ghp_, etc.), tokens/passwords, connection strings, private keys, cloud credentials, JWT secrets, webhook URLs, high-entropy strings\n6. Scan git history of changed files for previously-committed secrets\n7. Check .env / .gitignore: is .env in .gitignore? Does .env.example exist? Are any .env files tracked?\n8. Check for secrets in logs — console.log/logger statements that might leak tokens, headers, or request bodies\n9. Verify secrets management — env vars, secret managers, encrypted config\n\n## Output: Secrets Report Section (REQUIRED)\n\n```\n### Secrets Scan Results\n\n**Status:** CLEAN / FINDINGS DETECTED\n\n| Severity | File | Line | Type | Detail |\n|----------|------|------|------|--------|\n```\n\nReport ALL findings with file paths and line numbers."
    - agent: scout
      prompt: "# Step 4: Test, Documentation & Best Practices Scout\n\nAnalyze test coverage, inline documentation, and best practices compliance.\n\nUser request: $ORIGINAL\n\n## Test Coverage\n\n1. Identify change scope; find existing tests for each changed file (co-located, test dir, integration)\n2. Assess coverage gaps in changed code\n3. Run the test suite; report pass/fail and execution time\n\n## Inline Documentation\n\n4. Study 3-5 well-documented files first to understand the project's documentation standard\n5. Audit changed files for: JSDoc/TSDoc on exported functions/types/classes, inline comments on complex logic, ABOUTME headers if used, module-level documentation\n6. Flag under-documented code with the project's golden-example reference\n\n## Best Practices\n\n7. Detect language/framework/runtime\n8. Check framework-specific best practices (TS strict, React hooks, Node async, Next.js boundaries, Python PEP 8, Go error wrapping, etc.)\n9. Search for common pitfalls of the detected framework version\n\n## Output: Documentation & Best Practices Sections (REQUIRED)\n\n```\n### Documentation Gaps\n| Location | What Needs Documentation | Example From Codebase |\n\n### Best Practices Violations\n| Location | Violation | Best Practice | Reference |\n```\n\nReport all findings with file paths, line numbers, and test output."
    - agent: warden
      prompt: "# Step 5: Context Synthesis\n\nMerge the findings from the four scouts into a unified context document.\n\n## Scout Reports\n\n### Architecture\n$INPUT_1\n\n### Pattern, Convention & DRY\n$INPUT_2\n\n### Dependency & Secrets\n$INPUT_3\n\n### Tests, Documentation & Best Practices\n$INPUT_4\n\nProduce the consolidated context per your synthesis-mode output format. Include dedicated DRY, Documentation, and Best Practices sections, plus a per-file context table and a review-priority map."
    - agent: sgl-fork-runner
      prompt: "# Step 6: Parallel Quality + Security Review\n\nThe input below is the synthesized review context. Run a parallel four-persona review (correctness, security, performance, dry) via the sgl-fork-review skill. Emit the skill's JSON verbatim.\n\n$INPUT"
    - agent: paladin
      prompt: "# Step 7: First Remediation\n\nApply fixes for the issues in the merged findings JSON below. Prioritize Critical and High; secrets findings are NEVER skipped. Follow your fix-priority order (secrets → DRY → documentation → best practices → correctness/performance). Be surgical.\n\n$INPUT\n\nProduce a remediation summary listing fixes applied, fixes skipped (with reason), secrets rotation advisory if applicable, and a per-file changes section."
    - agent: warden
      prompt: "# Step 8: Validation Review (Devil's Advocate)\n\nChallenge and verify the remediation. Read each modified file directly — do not trust the summary. Check correctness, regressions, incomplete fixes, severity ratings, and what was missed.\n\nOriginal request: $ORIGINAL\n\nRemediation summary:\n$INPUT"
    - agent: herald
      prompt: "# Step 9: Test Verification\n\nRun the full test suite. If failures were caused by the remediation, fix them. Add focused regression tests for high-severity fixes that lack coverage. Re-run tests to confirm.\n\nValidation review:\n$INPUT\n\nReport initial run, test failures remediated, new tests added, and final run status."

# ─── Audit, security, performance, observability (unchanged from prior config) ───

audit:
  description: "Comprehensive code audit — scans project, finds issues, generates report and hardening plan"
  steps:
    - agent: scout
      prompt: "# Phase 0: Project Discovery\n\nIdentify language(s), framework(s), key dependencies, build tooling. Map architecture: entry points, data layer, external integrations, auth, background jobs. Classify project type (web API, frontend, mobile, CLI, library, monorepo) and load the appropriate best-practice lens. Search for current best practices and known CVEs for detected dep versions.\n\n$INPUT"
    - agent: reviewer
      prompt: "# Phase 1: Deep Scan — Memory, Patterns, Performance, Resilience\n\nFor each finding, record: file path, line number(s), severity, category, description.\n\nProject Context:\n$INPUT\n\nScan for memory leaks (unclosed resources, listener accumulation, uncleared timers, orphaned subscriptions, circular refs, unbounded caches, closure captures, buffer accumulation, global pollution, detached DOM nodes, native bridge leaks); anti-patterns (error swallowing, unhandled async, race conditions, callback hell, god objects, magic constants, tight coupling, missing type safety, improper null handling, sync blocking, dead code); performance/reliability (N+1, missing indexes, unbounded queries, missing pagination, redundant re-renders, large bundles, missing caching, no graceful degradation, missing health checks, unoptimized assets); resilience (missing error boundaries, crash exceptions, no retries, missing timeouts, incomplete cleanup on failure, silent failures, missing boundary validation)."
    - agent: red-team
      prompt: "# Phase 1 (Security Track): Deep Scan — Security Vulnerabilities\n\nFor each finding, record: file path, line number(s), severity, category, description.\n\nProject Context:\n$INPUT_1\n\nScan for: injection (SQL/NoSQL/command/LDAP/template), XSS, auth weaknesses (hardcoded creds, weak tokens, missing expiry), authorization gaps (missing checks, IDOR, privilege escalation), secrets exposure, insecure storage, insecure communication, dependency CVEs, path traversal, CORS/CSRF/SSRF, logging sensitive data, insecure deserialization, missing rate limiting."
    - agent: reviewer
      prompt: "# Phase 2: Findings Report\n\nConsolidate findings into a structured markdown report with summary table by severity, then per-finding details (ID, file:line, category, description, impact, evidence). Group by severity.\n\nCode/perf/resilience findings:\n$INPUT_2\n\nSecurity findings:\n$INPUT_3"
    - agent: planner
      prompt: "# Phase 3: Hardening Plan\n\nProduce a prioritized remediation plan with Priority 1-4 buckets. For each fix include: what, where, how, verification. Include a tooling/automation table and recommended process changes (pre-commit hooks, CI stages, review checklist, recurring audits, monitoring).\n\nFindings Report:\n$INPUT"

sentry-setup:
  description: "Verify Sentry CLI setup — check auth, project linking, SDK integration, and DSN configuration"
  steps:
    - agent: reviewer
      prompt: "# Phase 1: Check Sentry Auth & Project\n\nVerify Sentry CLI auth (`sentry auth login --check` or `sentry info`), list orgs (`sentry org list --json`) and projects (`sentry project list --json`). Check local config for .sentryclirc, SENTRY_DSN in env, sentry.properties, sentry.client.config.*, and SDK integration in code.\n\n$INPUT"
    - agent: reviewer
      prompt: "# Phase 2: Sentry Setup Report\n\nProduce a clear setup status report: Authentication, Org & Project, SDK Integration, DSN Configuration, Missing Steps. Be explicit about what is configured vs missing.\n\nInvestigation Results:\n$INPUT"

sentry-logs:
  description: "Fetch Sentry issues, analyze root causes with Seer, and create a prioritized fix plan"
  steps:
    - agent: reviewer
      prompt: "# Phase 1: Fetch Sentry Issues\n\nList issues (`sentry issue list --json`); categorize by level/frequency/type/dates; rank by frequency × severity to identify top issues.\n\n$INPUT"
    - agent: reviewer
      prompt: "# Phase 2: Deep Investigation\n\nFor each top issue (up to 10), get root cause via `sentry issue explain <short-id>`. Correlate with local code: identify affected files/lines, check if code has changed since first reported, note patterns.\n\nIssue list:\n$INPUT"
    - agent: red-team
      prompt: "# Phase 3: Impact Analysis\n\nFor each issue: user-facing impact (crashes? user count? visibility?), system impact (performance, data loss, cross-service), pattern analysis, cross-reference with codebase for missing error handling, race conditions, leaks, config issues.\n\nIssues with root causes:\n$INPUT"
    - agent: reviewer
      prompt: "# Phase 4: Findings Report\n\nConsolidate into a Sentry Issues Report with severity summary table, top issue details (level, events, users, dates, file:line, root cause, impact), patterns & trends.\n\nIssue list & categories:\n$INPUT_1\n\nRoot cause analysis:\n$INPUT_2\n\nImpact analysis:\n$INPUT_3"
    - agent: planner
      prompt: "# Phase 5: Fix Plan\n\nProduce a prioritized fix plan grouping related fixes; reference `sentry issue plan <short-id>` where relevant; include verification (Sentry resolution check, regression tests). Add monitoring recommendations (alerts, breadcrumbs, performance traces, SLOs).\n\nFindings Report:\n$INPUT"

performance:
  description: "Performance optimization — profile bottlenecks, stress-test, and build an optimization plan"
  steps:
    - agent: scout
      prompt: "# Phase 0: Performance Discovery\n\nIdentify stack (manifests, build tooling, key deps); map entry points and hot paths (server routes, client routes, background jobs, DB access); inventory existing perf tooling (APM, caching, build optimizations, scaling); establish baseline metrics (bundle sizes, dep depth, route count, schema complexity, existing benchmarks).\n\n$INPUT"
    - agent: reviewer
      prompt: "# Phase 1: Deep Performance Scan\n\nFor each finding, record: file path, line number(s), severity, category, description.\n\nProject Context:\n$INPUT\n\nScan for: database/query (N+1, missing indexes, unbounded, missing pagination, inefficient joins, pool config, missing query cache, slow migrations); compute/IO (blocking IO, CPU-bound work on hot paths, unnecessary serialization, missing streaming, inefficient algorithms, redundant work, missing concurrency); frontend/rendering (re-renders, large bundles, missing code splitting, unoptimized assets, layout thrashing, missing virtual scrolling, render-blocking, missing preloading); network/caching (HTTP cache, waterfalls, over-fetching, compression, chatty protocols, connection reuse, request dedup); memory (leaks, unbounded caches, buffer accumulation, large object retention)."
    - agent: red-team
      prompt: "# Phase 2: Load & Stress Analysis\n\nFor each finding, record: file path, line number(s), severity, category, description.\n\nProject Context:\n$INPUT_1\n\nScan for: concurrency/contention (race conditions, lock contention, deadlocks, thread pool exhaustion, missing atomics); resource exhaustion (unbounded queues, pool exhaustion, fd leaks, memory pressure, missing backpressure, task leaks); scalability (single contention points, missing horizontal-scale support, thundering herd, missing rate limiting, inefficient serialization under load); timeout/failure cascade (missing timeouts, no circuit breakers, missing retry budgets, no graceful degradation, health check gaps)."
    - agent: reviewer
      prompt: "# Phase 3: Performance Findings Report\n\nConsolidate into a markdown report with severity summary, per-finding details (file:line, category, description, estimated impact, evidence). Group by severity.\n\nDeep scan findings:\n$INPUT_2\n\nLoad & stress findings:\n$INPUT_3"
    - agent: planner
      prompt: "# Phase 4: Optimization Plan\n\nPrioritized optimization plan: Quick Wins (high impact, low effort), Significant Optimizations, Architectural Improvements, Long-Term. Each fix: what, where, how, expected impact, verification, risk. Add tooling table (APM, bundle analysis, load testing, memory profiling, DB profiling, Lighthouse) and process changes (perf budgets in CI, continuous load testing, slow query alerts, perf review checklist, regular profiling).\n\nFindings Report:\n$INPUT"

secure:
  description: "AI security sweep — detect prompt injection vulnerabilities, credential exposure, and missing protections"
  steps:
    - agent: scout
      prompt: "# Phase 0: AI Security Discovery\n\nMap the AI attack surface: AI service imports, API call sites, AI-related env vars and endpoints, data flow from user input through to AI calls, presence of input validation, output filtering, rate limiting, auth on AI endpoints, secrets management.\n\n$INPUT"
    - agent: red-team
      prompt: "# Phase 1: AI Security Vulnerability Analysis\n\nDiscovery results:\n$INPUT\n\nEvaluate: prompt injection (system prompt override, indirect injection via DBs/URLs/files), credential exfiltration (key reveal via injection, tool call exfil, system prompt extraction), data leakage (cross-user access, PII flow, log exposure), abuse (rate/billing/token limits), output safety (HTML sanitization, eval risk). For each: file, line, severity, PoC, impact."
    - agent: reviewer
      prompt: "# Phase 2: AI Security Findings Report\n\nConsolidate into: Security Score X/100, Executive Summary, severity table, per-finding details (ID, severity, category, file:line, description, PoC, impact, recommendation), positive findings.\n\nDiscovery:\n$INPUT_1\n\nVulnerabilities:\n$INPUT_2"
    - agent: planner
      prompt: "# Phase 3: AI Security Hardening Plan\n\nPriority 1: Critical fixes (immediate code changes with file:line and code examples). Priority 2: Install protections (recommend /secure install for AI Security Guard, Security Policy YAML, rate limiting middleware, CI checks). Priority 3: Configuration (rate/token limits, logging, monitoring). Priority 4: Process (review checklist, incident response, alerting). Recommended architecture: User Input → Rate Limiter → Input Sanitizer → AI API → Output Filter → Response, with Audit Logger and Content Filter as side-channels.\n\nSecurity Report:\n$INPUT"

network-security-local:
  description: "Curated security intelligence, passive local inspection, safe local port analysis, and defensive reporting"
  steps:
    - agent: security-news-analyst
      prompt: "Gather current trusted security intelligence relevant to this local network security task. Prefer official or high-trust sources only (OWASP, CISA, NVD, CVE, protocol-relevant items).\n\nTask:\n$INPUT"
    - agent: network-scout
      prompt: "Perform passive local network inspection for this task. Inventory interfaces and local listeners first, then summarize bounded passive inspection findings that are safe and authorized.\n\nTask context:\n$ORIGINAL\n\nThreat intel context:\n$INPUT"
    - agent: port-scan-analyst
      prompt: "Perform a safe, scope-restricted local port analysis only if the task includes an explicit loopback or private IP target. Use conservative defaults and explain any refusal clearly.\n\nTask context:\n$ORIGINAL\n\nPassive inspection context:\n$INPUT"
    - agent: reviewer
      prompt: "Produce a defensive local network security report. Consolidate trusted intel, passive inspection findings, and safe port-analysis results. Separate completed checks, refused/skipped actions, findings, and recommended mitigations.\n\nSecurity intel:\n$INPUT_1\n\nPassive inspection:\n$INPUT_2\n\nPort analysis:\n$INPUT_3"
